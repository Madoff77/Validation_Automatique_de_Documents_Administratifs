x-airflow-common: &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    # Clé Fernet valide 32 bytes (base64url 44 chars). Override via AIRFLOW_FERNET_KEY dans .env
    # Ne pas utiliser ${VAR:-default=} avec "=" dans le default — Docker Compose tronque la valeur
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    AIRFLOW__WEBSERVER__WORKERS: "2"
    AIRFLOW__WEBSERVER__WORKER_TIMEOUT: "300"
    # Connection to backend services
    MONGO_URI: mongodb://${MONGO_ROOT_USER:-root}:${MONGO_ROOT_PASSWORD:-rootpassword}@mongo:27017
    MONGO_DB: ${MONGO_DB:-docplatform}
    MINIO_ENDPOINT: minio:9000
    MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
    MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    BACKEND_API_URL: http://backend-api:8000
    PYTHONPATH: /opt/airflow
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./backend/pipeline:/opt/airflow/pipeline
    - ./backend/storage:/opt/airflow/storage
    - ./backend/utils:/opt/airflow/utils
    - ./backend/api:/opt/airflow/api
    - model_data:/app/models/trained
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - docnet

services:
  # ─────────────────────────────────────────────────────────────
  # DATABASES
  # ─────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: docplatform-mongo
    restart: unless-stopped
    # --quiet supprime les logs INFO de connexion (Connection accepted, client metadata…)
    # qui floodent docker compose up à chaque healthcheck
    command: ["mongod", "--quiet"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-rootpassword}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-docplatform}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: [
        "CMD-SHELL",
        "mongosh \"mongodb://${MONGO_ROOT_USER:-root}:${MONGO_ROOT_PASSWORD:-rootpassword}@localhost:27017/admin?authSource=admin\" --quiet --eval \"db.adminCommand('ping').ok\" | grep 1"
      ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - docnet

  mongo-express:
    image: mongo-express:1.0.2
    container_name: docplatform-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-root}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-rootpassword}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-root}:${MONGO_ROOT_PASSWORD:-rootpassword}@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-admin}
    ports:
      - "8081:8081"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - docnet

  postgres:
    image: postgres:15
    container_name: docplatform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - docnet

  # ─────────────────────────────────────────────────────────────
  # OBJECT STORAGE (Data Lake S3-compatible)
  # ─────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: docplatform-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
    #   interval: 15s
    #   timeout: 5s
    #   retries: 5
    networks:
      - docnet

  minio-init:
    image: minio/mc:RELEASE.2024-01-16T16-06-34Z
    container_name: docplatform-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO to be ready...';
      until mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} > /dev/null 2>&1; do
        echo 'MinIO not ready, retrying in 2s...';
        sleep 2;
      done;
      echo 'MinIO ready — creating buckets';
      mc mb --ignore-existing myminio/raw;
      mc mb --ignore-existing myminio/clean;
      mc mb --ignore-existing myminio/curated;
      mc anonymous set download myminio/curated;
      echo 'MinIO buckets initialized';
      "
    networks:
      - docnet

  # ─────────────────────────────────────────────────────────────
  # AIRFLOW
  # ─────────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: docplatform-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow db upgrade
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER:-admin} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@docplatform.local \
          --password ${AIRFLOW_ADMIN_PASSWORD:-admin}
        echo "Airflow initialized"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: docplatform-airflow-webserver
    restart: unless-stopped
    command: >
      bash -c "rm -f /opt/airflow/airflow-webserver.pid && airflow webserver"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: docplatform-airflow-scheduler
    restart: unless-stopped
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─────────────────────────────────────────────────────────────
  # BACKEND API
  # ─────────────────────────────────────────────────────────────
  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docplatform-api
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-root}:${MONGO_ROOT_PASSWORD:-rootpassword}@mongo:27017
      MONGO_DB: ${MONGO_DB:-docplatform}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SECURE: "false"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-supersecretkey_change_in_production_please}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      AIRFLOW_URL: http://airflow-webserver:8080
      AIRFLOW_USERNAME: ${AIRFLOW_ADMIN_USER:-admin}
      AIRFLOW_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: "http://localhost:5173,http://localhost:5174,http://frontend-crm:80,http://frontend-compliance:80"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./scripts:/app/scripts
      - ./data-generator:/app/data-generator
      - model_data:/app/models/trained
    depends_on:
      mongo:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - docnet

  # ─────────────────────────────────────────────────────────────
  # FRONTENDS
  # ─────────────────────────────────────────────────────────────
  frontend-crm:
    build:
      context: ./frontend-crm
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    container_name: docplatform-frontend-crm
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend-api:
        condition: service_healthy
    networks:
      - docnet

  frontend-compliance:
    build:
      context: ./frontend-compliance
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    container_name: docplatform-frontend-compliance
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      backend-api:
        condition: service_healthy
    networks:
      - docnet

# ─────────────────────────────────────────────────────────────
# VOLUMES & NETWORKS
# ─────────────────────────────────────────────────────────────
volumes:
  mongo_data:
  postgres_data:
  minio_data:
  model_data:

networks:
  docnet:
    driver: bridge
